name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - shell: powershell
        run: |
          "C:\apache-maven-3.9.9\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append
          "JAVA_HOME=C:\Program Files\Eclipse Adoptium\jdk-17.0.14.7-hotspot" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          $settingsDir = "$HOME\.m2"
          if (!(Test-Path $settingsDir)) { mkdir $settingsDir }
          @"
          <settings>
            <mirrors>
              <mirror>
                <id>aliyun</id>
                <mirrorOf>central</mirrorOf>
                <name>Aliyun Maven</name>
                <url>https://maven.aliyun.com/repository/public</url>
              </mirror>
            </mirrors>
          </settings>
          "@ | Set-Content "$settingsDir\settings.xml" -Encoding utf8
      - run: mvn package -DskipTests -q
        working-directory: backend
      - shell: powershell
        run: |
          Copy-Item backend/giftgpt-server/target/giftgpt-server-1.0.0-SNAPSHOT.jar C:\giftgpt\ -Force
          @"
          122.51.33.146 {
              reverse_proxy /api/* localhost:8080
          }
          "@ | Set-Content C:\giftgpt\Caddyfile -Force
          Get-Process java -ErrorAction SilentlyContinue | Where-Object { $_.CommandLine -like '*giftgpt*' } | Stop-Process -Force
          Start-Process -WindowStyle Hidden -FilePath java -ArgumentList @("-Djava.net.preferIPv4Stack=true", "-jar", "C:\giftgpt\giftgpt-server-1.0.0-SNAPSHOT.jar", "--spring.profiles.active=prod")
      - name: Setup Caddy (optional)
        shell: powershell
        continue-on-error: true
        run: |
          if (!(Test-Path C:\giftgpt\caddy.exe)) {
            Invoke-WebRequest -Uri 'https://ghfast.top/https://github.com/caddyserver/caddy/releases/latest/download/caddy_windows_amd64.exe' -OutFile C:\giftgpt\caddy.exe
          }
          Get-Process caddy -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Process -WindowStyle Hidden -FilePath C:\giftgpt\caddy.exe -ArgumentList @("run", "--config", "C:\giftgpt\Caddyfile")

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: mvn package -DskipTests -q
        working-directory: backend
      - name: Download Caddy
        run: |
          curl -sL -o caddy.exe "https://github.com/caddyserver/caddy/releases/latest/download/caddy_windows_amd64.exe"
          echo '122.51.33.146 { reverse_proxy /api/* localhost:8080 }' > Caddyfile
      - name: Deploy to server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          TARGET: ${{ secrets.SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15"
          for i in 1 2 3; do
            echo "SCP attempt $i/3 (small files)..."
            scp $SSH_OPTS Caddyfile .github/workflows/deploy.ps1 "$USER@$HOST:$TARGET/" && break
            sleep 5
          done
          for i in 1 2 3; do
            echo "SCP attempt $i/3 (jar)..."
            scp $SSH_OPTS backend/giftgpt-server/target/giftgpt-server-1.0.0-SNAPSHOT.jar "$USER@$HOST:$TARGET/" && break
            sleep 5
          done
          for i in 1 2 3; do
            echo "SCP attempt $i/3 (caddy)..."
            scp $SSH_OPTS caddy.exe "$USER@$HOST:$TARGET/" && break
            sleep 5
          done
          for i in 1 2 3; do
            echo "SSH attempt $i/3 (run deploy.ps1)..."
            ssh $SSH_OPTS "$USER@$HOST" "powershell -File $TARGET\deploy.ps1" && break
            sleep 5
          done

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: mvn package -DskipTests -q
        working-directory: backend
      - name: Download Caddy
        run: |
          curl -sL -o caddy.exe "https://github.com/caddyserver/caddy/releases/latest/download/caddy_windows_amd64.exe"
          echo '122.51.33.146 { reverse_proxy /api/* localhost:8080 }' > Caddyfile
      - name: Deploy to server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          TARGET: ${{ secrets.SERVER_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          scp -o StrictHostKeyChecking=accept-new backend/giftgpt-server/target/giftgpt-server-1.0.0-SNAPSHOT.jar caddy.exe Caddyfile "$USER@$HOST:$TARGET/"
          ssh -o StrictHostKeyChecking=accept-new "$USER@$HOST" "cd $TARGET && start.bat"
          ssh -o StrictHostKeyChecking=accept-new "$USER@$HOST" "cd $TARGET && .\caddy.exe start --config Caddyfile"
